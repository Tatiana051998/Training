<!DOCTYPE html>
<html>
<head>
    <title>Урок 16</title>
    <style>
        body {
            background: white;
            color: black;
            transition: 0.3s;
            font-family: Arial;
            padding: 20px;
        }

        body.dark {
            background: black;
            color: white;
        }

        button {
            margin: 5px;
            padding: 8px 15px;
            cursor: pointer;
        }
        
        input {
            padding: 5px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h2>Задание 1</h2>
    <button id="changeTextBtn">Нажми меня</button>
    
    <h2>Задание 2</h2>
    <div id="resizeElement" style="width:100px; height:100px; background:blue;"></div>
    
    <h2>Задание 3</h2>
    <input type="text" id="keyupInput" placeholder="Нажми клавишу">
    
    <h2>Задание 4</h2>
    <form id="testForm">
        <input type="text" placeholder="Имя">
        <button type="submit">Отправить</button>
    </form>
    
    <h2>Задание 5</h2>
    <button id="themeBtn">Изменить тему</button>
    
    <script src="script.js"></script>
</body>
</html>
