<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Урок 31</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="task">
            <h2>Контактная информация</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="contactName">Имя:</label>
                    <input type="text" id="contactName" class="form-input" placeholder="Введите имя" required>
                </div>
                <div class="form-group">
                    <label for="contactPhone">Телефон:</label>
                    <input type="tel" id="contactPhone" class="form-input" placeholder="+7 123 456-78-90" required>
                </div>
                <div class="form-group">
                    <label for="contactEmail">Email:</label>
                    <input type="email" id="contactEmail" class="form-input" placeholder="email@example.com" required>
                </div>
                <button type="submit">Сохранить контакт</button>
                <button type="button" id="loadContactBtn">Загрузить контакт</button>
                <button type="button" id="deleteContactBtn" class="danger-btn">Удалить контакт</button>
            </form>
            
            <div id="contactDisplay" class="display">
                <span class="empty">Нет сохранённого контакта</span>
            </div>
        </div>

        <div class="task">
            <h2>Учёт расходов</h2>
            <form id="expenseForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="expenseDesc">Описание:</label>
                        <input type="text" id="expenseDesc" class="form-input" placeholder="Например: Продукты" required>
                    </div>
                    <div class="form-group">
                        <label for="expenseAmount">Сумма:</label>
                        <input type="number" id="expenseAmount" class="form-input" placeholder="1000" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="expenseDate">Дата:</label>
                        <input type="date" id="expenseDate" class="form-input" required>
                    </div>
                </div>
                <button type="submit">Добавить расход</button>
                <button type="button" id="clearExpensesBtn" class="danger-btn">Удалить все расходы</button>
            </form>
            
            <div id="expenseList">
                <p class="empty">Нет расходов</p>
            </div>
            
            <div id="expenseTotal">
                <strong>Итого: <span id="totalAmount">0</span> руб.</strong>
            </div>
        </div>

        <div class="task">
            <h2>Счётчик времени</h2>
            <div class="timer-display">
                <div class="timer-icon">⏱️</div>
                <div id="timerDisplay">00:00:00</div>
                <div style="font-size: 14px; color: #888; margin-top: 5px;">
                    Закрой и открой страницу — время сохранится!
                </div>
            </div>
            
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button id="resetTimerBtn" class="danger-btn">Сбросить таймер</button>
                <button id="clearSessionBtn" class="danger-btn">Очистить SessionStorage</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
